    .telegram-btn{
      display:flex;
      justify-content:center;
      align-items:center;
      width:100%;
      max-width:380px;
      margin:auto;
      height:85px;
      border-radius:24px;
      text-decoration:none;
      font-size:22px;
      font-weight:700;
      color:#555;
      background:linear-gradient(90deg,#79d7ff,#dbeeff,#38bfff);
      border:3px solid #74d4ff;
      box-shadow:
      0 0 15px #1bbdff,
      0 0 35px rgba(27,189,255,0.7);
      transition:.3s;
    }

    .telegram-btn:hover{
      transform:scale(1.03);
    }

    .offer-box{
      margin-top:45px;
      border:4px solid #1db7ff;
      border-radius:35px;
      padding:35px 20px;
      box-shadow:
      0 0 15px rgba(29,183,255,0.6),
      inset 0 0 10px rgba(29,183,255,0.2);

    .offer-title{
      color:#29b6ff;
      font-size:28px;
      font-weight:700;
      margin-bottom:30px;
    }

    .timer{
      display:flex;
      justify-content:center;

    .time-box{
      width:135px;
      height:160px;
      border:4px solid #1db7ff;
      border-radius:28px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      0 0 15px rgba(29,183,255,0.7),
      inset 0 0 8px rgba(29,183,255,0.2);

<script>

let totalSeconds = 30;

const minutesEl = document.getElementById('minutes');
const secondsEl = document.getElementById('seconds');

setInterval(() => {

  let minutes = Math.floor(totalSeconds / 60);
  let seconds = totalSeconds % 60;

  minutesEl.innerHTML = String(minutes).padStart(2,'0');
  secondsEl.innerHTML = String(seconds).padStart(2,'0');

  if(totalSeconds > 0){
    totalSeconds--;
  }else{
    totalSeconds = 30;
  }

},1000);

</script>
