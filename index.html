    body{

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:32px;

      line-height:1.2;
    }

      margin-top:20px;
      font-size:18px;
    }

    .btn{
      display:block;
      width:100%;
      background:#ff1111;
      color:white;
      text-decoration:none;
      padding:22px;
      margin-top:28px;
      border-radius:22px;
      font-size:20px;
      font-weight:bold;
      box-shadow:0 0 20px rgba(255,0,0,0.6);
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.03);
    }

    .footer{
      margin-top:30px;
      color:#ff2a2a;
      font-size:16px;
    }
